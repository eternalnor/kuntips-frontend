<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="white" stop-opacity="0.18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="48" fill="url(#bg)"/>
  <rect width="200" height="100" rx="48" fill="url(#shine)"/>

  <!-- Coin ring -->
  <circle cx="100" cy="116" r="50" stroke="white" stroke-width="9" stroke-opacity="0.85"/>

  <!-- Upward arrow -->
  <path d="M100 90V148M80 110L100 88L120 110"
    stroke="white" stroke-width="11"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkle dots -->
  <circle cx="158" cy="42" r="7" fill="white" fill-opacity="0.5"/>
  <circle cx="174" cy="64" r="4.5" fill="white" fill-opacity="0.3"/>
  <circle cx="144" cy="26" r="3.5" fill="white" fill-opacity="0.2"/>
</svg>
