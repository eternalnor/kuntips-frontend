<!doctype html>
<html lang="en-NO">
  <head>
    <!-- KunTips Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/KunTips_Icon_Only_Transparent.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KunTips — support your favourite creators</title>
    <meta name="description" content="Send a one-time tip to your favourite creator in seconds — no account needed. Creators keep 95–100% of every tip. Private, secure, powered by Stripe." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KunTips — support your favourite creators" />
    <meta property="og:description" content="Private one-time tips. No fan accounts. Creators keep 95–100%. Powered by Stripe." />
    <meta property="og:url" content="https://kuntips.no" />
    <meta property="og:image" content="https://kuntips.no/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://kuntips.no/og-image.png" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="canonical" href="https://kuntips.no/" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "KunTips",
      "url": "https://kuntips.no",
      "description": "Send private one-time tips to your favourite creators. No account needed. Creators keep 95-100%. Powered by Stripe.",
      "publisher": {
        "@type": "Organization",
        "name": "Eternal AS",
        "url": "https://kuntips.no",
        "logo": {
          "@type": "ImageObject",
          "url": "https://kuntips.no/og-image.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kuntips.no/{username}",
        "query-input": "required name=username"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
